<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Internet Programming Movie Site</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>

    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <div class="nav-links">
        <a href="login.html">로그인</a> | <span>회원가입</span>
    </div>

    <div class="form-container">

        <!-- 1. text input + autofocus + required -->
        <div class="form-row">
            <label for="name">이름 :</label>
            <input type="text" id="name" name="name" autofocus required>
        </div>

        <!-- 2. date input + required -->
        <div class="form-row">
            <label for="birthday">생일 :</label>
            <input type="date" id="birthday" name="birthday" required>
        </div>

        <!-- 3. radio buttons -->
        <div class="form-row">
            <label>성별 :</label>
            <div>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male" class="radio-label">남성</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female" class="radio-label">여성</label>
            </div>
        </div>

        <!-- 4. number input + step -->
        <div class="form-row">
            <label for="grade">학년 :</label>
            <input type="number" id="grade" name="grade" min="1" max="4" step="1">
        </div>

        <!-- 5. text input + placeholder + autocomplete -->
        <div class="form-row">
            <label for="userid">아이디 :</label>
            <input type="text" id="userid" name="userid" placeholder="아이디를 입력하세요" autocomplete="username" required>
        </div>

        <!-- 6. password input + placeholder -->
        <div class="form-row">
            <label for="password">비밀번호 :</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
        </div>

        <!-- 7. email input + placeholder + autocomplete -->
        <div class="form-row">
            <label for="email">이메일 :</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email">
        </div>

        <!-- 8. select (dropdown) -->
        <div class="form-row">
            <label for="security">보안 질문 :</label>
            <select id="security" name="security">
                <option value="" selected>질문을 선택하세요</option>
                <option value="pet">첫 번째 반려동물의 이름은?</option>
                <option value="school">졸업한 초등학교 이름은?</option>
                <option value="food">가장 좋아하는 음식은?</option>
                <option value="city">태어난 도시는?</option>
            </select>
        </div>

        <!-- 9. text input -->
        <div class="form-row">
            <label for="answer">답변 :</label>
            <input type="text" id="answer" name="answer">
        </div>

        <!-- Buttons -->
        <div class="form-row btn-group">
            <button type="button" class="btn-signup">Signup</button>
            <button type="button" class="btn-cancel">Cancel</button>
        </div>

    </div>

</body>
</html>
