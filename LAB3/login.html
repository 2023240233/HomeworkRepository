<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 김성민의 시네마</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="page-container">

        <!-- ===== HEADER ===== -->
        <header class="site-header">
            <div class="title-bar">
                <div class="title-spacer"></div>
                <h1 class="header-title">로그인 <span class="accent">페이지</span>입니다.</h1>
            </div>

            <nav class="navigation">
                <a href="index.html" class="nav-link">메인페이지</a>
                <a href="login.html" class="nav-link nav-link-active">로그인</a>
                <a href="signup.html" class="nav-link">회원가입</a>
            </nav>
        </header>

        <!-- ===== MAIN: login form ===== -->
        <main class="main-content auth-main">
            <section class="auth-section">
                <h2 class="section-title">Login</h2>

                <form class="auth-form" action="#" method="post">
                    <div class="form-row">
                        <label class="form-label" for="login-id">아이디</label>
                        <input type="text"
                               id="login-id"
                               name="username"
                               class="form-input"
                               placeholder="아이디를 입력하세요"
                               required>
                    </div>

                    <div class="form-row">
                        <label class="form-label" for="login-pw">비밀번호</label>
                        <input type="password"
                               id="login-pw"
                               name="password"
                               class="form-input"
                               placeholder="비밀번호를 입력하세요"
                               required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">로그인</button>
                        <a href="signup.html" class="btn-secondary">회원가입</a>
                    </div>
                </form>

                <p class="auth-aside">
                    아직 계정이 없으신가요?
                    <a href="signup.html">회원가입 하러가기</a>
                </p>
            </section>
        </main>
    </div>
</body>
</html>
